name: 'Discourse Topics for GitHub Releases'
description: 'Create a Discourse topic for a published GitHub release'
author: Scott Walkinshaw
branding:
  icon: 'package'  
  color: 'blue'
inputs:
  discourse-base-url:
    description: 'Base URL of Discourse'
    required: true
  discourse-api-key:
    description: 'Discourse API key'
    required: true
  discourse-author-username:
    description: 'Author username for posting to Discourse. Default: system. If omitted, username mapping from .github/discourse.yml is attempted when a GitHub token is available.'
    required: false
  github-token:
    description: 'GitHub token for fetching .github/discourse.yml. Default: GITHUB_TOKEN'
    required: false
  discourse-category:
    description: 'ID of the post category'
    required: false
  discourse-tags:
    description: 'Post tags (comma-separated list)'
    required: false
  package-name:
    description: 'Name of the package/repo being released. Defaults to the GitHub repo name.'
    required: false
outputs:
  topic-url:
    description: 'URL of the topic created'
runs:
  using: 'node24'
  main: 'dist/index.js'
